name: Publish to npmjs.org

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match packages/react/package.json)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    # id-token: write は将来 OIDC Trusted Publisher 移行用に残置
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@willink-labs"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run guardrails
        run: pnpm guardrails

      - name: Run tests
        run: pnpm -r --if-present test

      - name: Build all packages
        run: pnpm -r build

      # 一時的に token-based publish (Plan B 経過):
      # 1. ここで NPM_TOKEN (Granular・bypass 2fa) で初回 publish
      # 2. publish 成功後 CEO が npmjs.com で Trusted Publisher 設定
      # 3. workflow を OIDC 化 (--provenance + NODE_AUTH_TOKEN 削除) に再修正
      - name: Publish @willink-labs/tokens
        run: npm publish --access public
        working-directory: packages/tokens
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @willink-labs/tailwind-preset
        run: npm publish --access public
        working-directory: packages/tailwind-preset
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @willink-labs/react
        run: npm publish --access public
        working-directory: packages/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Publish to npmjs.org (OIDC Trusted Publisher)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match packages/react/package.json)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    # Required for OIDC trusted publisher (npmjs.com)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@willink-labs"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run guardrails
        run: pnpm guardrails

      - name: Run tests
        run: pnpm -r --if-present test

      - name: Build all packages
        run: pnpm -r build

      # OIDC trusted publisher 経由で publish (NPM_TOKEN 不要・provenance 自動付与)
      - name: Publish @willink-labs/tokens
        run: npm publish --provenance --access public
        working-directory: packages/tokens

      - name: Publish @willink-labs/tailwind-preset
        run: npm publish --provenance --access public
        working-directory: packages/tailwind-preset

      - name: Publish @willink-labs/react
        run: npm publish --provenance --access public
        working-directory: packages/react

name: Publish to npmjs.org (OIDC Trusted Publisher)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match packages/react/package.json)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    # Required for OIDC trusted publisher (npmjs.com 2024 GA)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@willink-labs"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run guardrails
        run: pnpm guardrails

      - name: Run tests
        run: pnpm -r --if-present test

      - name: Build all packages
        run: pnpm -r build

      # OIDC Trusted Publisher 経由で publish
      # - NODE_AUTH_TOKEN 不要 (token 完全廃止・期限切れ概念なし)
      # - pnpm publish 経由で workspace:* の peerDeps を実 version に自動置換
      #   (npm publish 直接実行だと workspace:* が tarball にそのまま残り consumer install で fail する)
      # - Provenance attestation は npmjs.com 制約で source repo が public な場合のみ可能
      #   willink-design-system は private repo のため --provenance フラグは使用不可
      - name: Publish @willink-labs/tokens
        run: pnpm -F @willink-labs/tokens publish --access public --no-git-checks

      - name: Publish @willink-labs/tailwind-preset
        run: pnpm -F @willink-labs/tailwind-preset publish --access public --no-git-checks

      - name: Publish @willink-labs/react
        run: pnpm -F @willink-labs/react publish --access public --no-git-checks

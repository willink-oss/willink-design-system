name: Security Audit

on:
  schedule:
    # Monday 02:00 UTC = 11:00 JST. Aligned with Dependabot weekly run.
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        id: audit
        run: |
          set +e
          pnpm audit --prod --audit-level=high --json > /tmp/audit.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open issue on high/critical findings
        if: steps.audit.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          summary=$(jq -r '"\(.metadata.vulnerabilities.high // 0) high / \(.metadata.vulnerabilities.critical // 0) critical"' /tmp/audit.json)
          body=$(jq -r '
            (.advisories // {}) as $a |
            ($a | to_entries | map("- **\(.value.severity)** `\(.value.module_name)`: \(.value.title) ([advisory](\(.value.url)))")[]) // "See workflow log."
          ' /tmp/audit.json)
          gh issue create \
            --title "[security] pnpm audit detected high/critical vulnerabilities ($summary)" \
            --body "$body

          ---
          Auto-generated by \`.github/workflows/audit.yml\` on $(date -u +%Y-%m-%dT%H:%M:%SZ).
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "security,dependencies"

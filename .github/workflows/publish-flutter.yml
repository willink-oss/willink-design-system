name: Publish willink_theme to pub.dev

# Triggered by tags of the form `flutter-v*` (e.g. flutter-v0.1.0) or manual
# workflow_dispatch. Independent from the existing publish.yml (which handles
# the npm packages on tags `v*`).

on:
  push:
    tags: ['flutter-v*']
  workflow_dispatch:

jobs:
  publish:
    name: dart pub publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for pub.dev OIDC Trusted Publisher
      contents: read
    defaults:
      run:
        working-directory: packages/flutter_theme
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Flutter 3.29+ ships with Dart 3.7+ which matches pubspec sdk: ^3.7.0.
          # Use stable channel (latest) to avoid SDK version drift.
          flutter-version: '3.29.0'

      # Required for pub.dev OIDC Trusted Publisher authentication.
      # subosito/flutter-action ships Dart but does NOT configure the
      # GitHub OIDC token for pub.dev — dart-lang/setup-dart does that.
      # Ref: https://dart.dev/tools/pub/automated-publishing
      - uses: dart-lang/setup-dart@v1

      # Tag/pubspec agreement + pre-release awareness (ADR-0012 Layer 2 #1 / ADR-0019).
      # pub.dev has no dist-tags: isolation is inherent in the SemVer string —
      # a pre-release version (`X.Y.Z-beta.N`) is excluded from default
      # `^`-constraint resolution, so existing consumers never auto-upgrade to it.
      # Only runs on tag pushes (workflow_dispatch is a manual human path).
      - name: Verify tag/pubspec agreement
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#flutter-v}"
          PUBSPEC_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "::error::Tag/pubspec mismatch: tag '$TAG_VERSION' vs pubspec '$PUBSPEC_VERSION'. Refusing to publish."
            exit 1
          fi
          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "Pre-release '$TAG_VERSION' — pub.dev excludes it from default ^-constraint resolution (ADR-0019)."
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Dry-run publish (sanity)
        run: dart pub publish --dry-run

      - name: Publish to pub.dev (OIDC Trusted Publisher)
        run: dart pub publish --force

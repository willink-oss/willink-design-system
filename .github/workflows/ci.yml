name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guardrails (anti-yak-shaving check)
        run: pnpm guardrails

      - name: Tests (vitest across packages)
        run: pnpm -r --if-present test

      - name: Build (all packages)
        run: pnpm -r build

      - name: pnpm audit (high+ fails the build)
        run: pnpm audit --prod --audit-level=high

name: Deploy Playground + Storybook + Registry to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build playground (static export)
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /willink-design-system
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (workspace deps)
        run: pnpm -r --filter='!./apps/playground' build

      - name: Build playground (static export)
        run: pnpm --filter=playground build

      # Storybook was already built by the "Build all packages" step
      # (storybook build → apps/storybook/storybook-static). Serve it under
      # /storybook of the same Pages site — its static output uses relative
      # asset paths, so it resolves correctly at the subpath (no base config).
      - name: Add Storybook under /storybook
        run: |
          mkdir -p apps/playground/out/storybook
          cp -r apps/storybook/storybook-static/. apps/playground/out/storybook/

      # Serve the @willink shadcn registry under /r of the same Pages site, so
      # `npx shadcn add <pages-url>/r/<name>.json` resolves (ADR-0020). The
      # "Build all packages" step above already runs `shadcn build`; rebuild
      # explicitly here (idempotent, ~1s) so the registry hosting can't silently
      # break if that filter changes. shadcn build emits the gitignored
      # apps/registry/public/r/*.json.
      - name: Add @willink registry under /r
        run: |
          pnpm --filter=registry build
          mkdir -p apps/playground/out/r
          cp -r apps/registry/public/r/. apps/playground/out/r/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/playground/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: willink_theme
description: i-Willink Design System theme for Flutter — Material 3 ThemeData factories on a single-brand baseline, consumer-overridable via ColorScheme copyWith.
version: 1.2.0
homepage: https://github.com/willink-oss/willink-design-system
repository: https://github.com/willink-oss/willink-design-system
issue_tracker: https://github.com/willink-oss/willink-design-system/issues
documentation: https://github.com/willink-oss/willink-design-system/blob/main/packages/flutter_theme/README.md

environment:
  sdk: ^3.7.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
